services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: malleable_pls
      POSTGRES_USER: pls
      POSTGRES_PASSWORD: pls
    ports:
      - "${PG_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pls -d malleable_pls"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
